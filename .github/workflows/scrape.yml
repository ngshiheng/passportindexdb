name: Scrape latest data

on:
    push:
        branches:
            - "main"
        paths:
            - "**.py"
            - ".github/workflows/**"
            - Makefile
            - data/metadata.json

    workflow_dispatch:
    schedule:
        - cron: "0 0 * * 0" # At 00:00 on Sunday

concurrency:
    group: passportindexdb-artifact
    cancel-in-progress: false

jobs:
    scrape-build-export:
        runs-on: ubuntu-latest
        permissions:
            actions: read # allows github.token to list/download artifacts via the API
            contents: read # required by actions/checkout
        steps:
            - name: Check out this repo
              uses: actions/checkout@v4

            - name: Set up python
              uses: actions/setup-python@v6
              with:
                  python-version: 3.14

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=passport-index-db&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            # Download the artifact (our SQLite DB!) from the last run
            - name: Download artifact
              uses: actions/download-artifact@v8
              with:
                  name: passport-index-db
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }} # Run ID of the artifact (SQLite DB) uploaded from the last run
                  github-token: ${{ github.token }}
              continue-on-error: true # handles first-ever run (no artifact) and artifact expiry gracefully

            - name: Display downloaded file
              run: ls -la data

            - name: Run scrape.py
              run: python3 scrape.py

            - name: Validate DB row counts
              run: |
                  COUNT=$(sqlite3 data/passportindex.db "SELECT COUNT(*) FROM VisaRequirement;")
                  echo "Row count: $COUNT"
                  if [ "$COUNT" -lt 10000 ]; then
                    echo "ERROR: Row count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated artifact
              uses: actions/upload-artifact@v7
              with:
                  name: passport-index-db
                  path: ./data/passportindex.db
                  if-no-files-found: error
                  retention-days: 90

            - name: Install datasette and kaggle
              run: |
                  pipx install datasette kaggle

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ngshiheng
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker image
              run: make docker-build

            - name: Push Docker image
              run: make docker-push

            - name: Export Kaggle CSVs
              run: |
                  make kaggle-export

            - name: Verify Kaggle CSVs
              run: |
                  ls -la kaggle
                  wc -l kaggle/*.csv

            - name: Upload dataset to Kaggle
              env:
                  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
                  KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
              run: |
                  # INITIAL STEP: run locally once:
                  # kaggle datasets create -p kaggle
                  # After initial creation, this will push new versions:
                  make kaggle-push

    deploy:
        needs: scrape-build-export
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Check out this repo
              uses: actions/checkout@v6

            - name: Get Latest Deployment ID
              id: get-deployment
              run: |
                  echo "Fetching latest deployment ID..."
                  RESPONSE=$(curl --fail-with-body -s -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --url https://backboard.railway.app/graphql/v2 \
                    -d '{
                      "query": "query deployments { deployments(last: 1, input: { projectId: \"${{ secrets.RAILWAY_PROJECT_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", status: { in: [SUCCESS, SLEEPING] } }) { edges { node { id status } } } }",
                      "operationName": "deployments"
                    }')

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi

                  DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id')
                  echo "Found deployment ID: $DEPLOYMENT_ID"
                  echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

            - name: Trigger redeployment
              run: |
                  echo "Triggering redeployment for ID: ${{ steps.get-deployment.outputs.deployment_id }}"
                  RESPONSE=$(curl --fail-with-body -s -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --url https://backboard.railway.app/graphql/v2 \
                    -d "{
                      \"query\": \"mutation { deploymentRedeploy(id: \\\"${{ steps.get-deployment.outputs.deployment_id }}\\\", usePreviousImageTag: true) { id status } }\"
                    }")

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi
